name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Backend: lint + check + tests
  # ──────────────────────────────────────────────
  backend-lint:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  backend-test:
    name: "Backend · Tests"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Django system check
        env:
          DEBUG: "True"
          USE_SQLITE: "true"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
          SCHEDULER_AUTOSTART: "false"
        run: python manage.py check

      - name: Check migrations
        env:
          DEBUG: "True"
          USE_SQLITE: "true"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
          SCHEDULER_AUTOSTART: "false"
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        env:
          DEBUG: "True"
          USE_SQLITE: "true"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
          SCHEDULER_AUTOSTART: "false"
        run: |
          python -m pytest --tb=short -q \
            --cov=apps --cov=core \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ──────────────────────────────────────────────
  # Frontend: type-check + build
  # ──────────────────────────────────────────────
  frontend:
    name: "Frontend · Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Gate: todo debe pasar antes de deploy
  # ──────────────────────────────────────────────
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.backend-test.result }}" != "success" ]; then
            echo "::error::Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "::error::Frontend build failed"
            exit 1
          fi
          echo "All checks passed — safe to deploy"
